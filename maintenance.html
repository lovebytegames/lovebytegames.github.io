<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Under Maintenance | Lovebyte Games</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      font-family: "Bricolage Grotesque", sans-serif;
      overflow: hidden;
    }

    @keyframes pulseGlow {
      0%, 100% {
        transform: scale(1);
        opacity: 0.45;
      }

      50% {
        transform: scale(1.08);
        opacity: 0.7;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-glow {
      animation: pulseGlow 7s ease-in-out infinite;
    }

    .animate-fade-up {
      animation: fadeUp 0.9s ease forwards;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>



<body class="relative flex min-h-screen items-center justify-center bg-slate-950 text-white">

 <!-- Background Image -->
<div class="absolute inset-0 -z-20 overflow-hidden">

  <!-- Image -->
  <img
    src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?q=80&w=1469&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    alt="Background"
    class="h-full w-full object-cover blur-md scale-110 opacity-45"
  />

  <!-- Dark Overlay -->
  <div class="absolute inset-0 bg-slate-950/80"></div>

  <!-- Gradient Glow -->
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,#000,transparent_35%),radial-gradient(circle_at_bottom_right,#000,transparent_35%)]"></div>

</div>

  <!-- Glow -->
  <div class="animate-glow absolute left-20 top-20 -z-10 h-96 w-96 rounded-full bg-black/20 blur-3xl"></div>

  <div class="animate-glow absolute bottom-10 right-10 -z-10 h-96 w-96 rounded-full bg-black/20 blur-3xl"></div>

  <!-- Maintenance Card -->
  <div class="glass animate-fade-up mx-6 w-full max-w-2xl rounded-md p-10 text-center shadow-2xl backdrop-blur-xl">

    <!-- Icon -->
    <div class="mx-auto flex h-24 w-24 items-center justify-center rounded-md bg-black/30 text-5xl text-white/80">
      <i class="fa-solid fa-screwdriver-wrench"></i>
    </div>

    <!-- Title -->
    <h1 class="mt-8 bg-clip-text text-5xl font-black md:text-7xl">
      Under Maintenance
    </h1>

    <!-- Text -->
    <p class="mx-auto mt-6 max-w-xl text-md leading-relaxed text-white/60 bg-black/30 p-4 rounded-md border border-white/10">
        Our website is down for a color rebranding.
    </p>

    <!-- Status -->
    <div class="mt-8 inline-flex items-center gap-3 rounded-md border border-red-400/20 bg-red-400/10 px-5 py-3 text-sm font-bold text-red-300">

      <div class="h-3 w-3 animate-pulse rounded-md bg-red-400"></div>

      Offline - We'll be back soon!

    </div>

    <!-- ETA 
    <p class="mt-8 text-md text-white/40">
      <i class="fa-solid fa-clock"></i> Estimated return:
    </p>
-->

  </div>

</body>
</html>
