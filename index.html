<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Age Verification</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    body{
      background:
        radial-gradient(circle at top left,#4e4e4e22,transparent 30%),
        radial-gradient(circle at bottom right,#1c1c1c22,transparent 30%),
        #000000;

      overflow:hidden;
    }

    .glass{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(18px);
    }

    .fade-in{
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center text-white px-6">

  <!-- AGE GATE -->
  <div class="glass fade-in w-full max-w-xl rounded-md p-10 text-center shadow-2xl border-red-500/50">

    <!-- ICON -->
    <div class="mb-6">
      <div class="mx-auto flex h-24 w-24 items-center justify-center rounded-md bg-black/20 border border-white/20">
        <i class="fa-solid fa-user-shield text-4xl text-white/300"></i>
      </div>
    </div>

    <!-- TITLE -->
    <h1 class="text-4xl md:text-5xl font-black tracking-tight">
      Are you over 18?
    </h1>

    <!-- TEXT -->
    <p class="mt-5 text-white/60 leading-relaxed">
      This website contains adult-oriented content intended for mature audiences only.
      By entering, you confirm you are at least 18 years old.
    </p>

    <!-- REMEMBER -->
    <label class="mt-8 flex items-center justify-center gap-3 text-sm text-white/70 cursor-pointer select-none">
      <input
        type="checkbox"
        id="rememberChoice"
        class="h-5 w-5 rounded border-white/20 bg-black/30 accent-gray-300 transition focus:ring-0 focus:ring-offset-0"
      />

      Remember my choice
    </label>

    <!-- BUTTONS -->
    <div class="mt-8 flex flex-col sm:flex-row justify-center gap-4">

      <!-- YES -->
      <button
        onclick="enterSite()"
        class="group rounded-md bg-black/30 border border-white/20 px-8 py-4 font-bold text-white transition hover:scale-105"
      >
        <i class="fa-solid fa-check mr-2"></i>
        Yes, Enter
      </button>

      <!-- NO -->
      <button
        onclick="leaveSite()"
        class="group rounded-md border border-white/10 bg-white/5 px-8 py-4 font-bold text-white/80 transition hover:bg-white/10 hover:scale-105"
      >
        <i class="fa-solid fa-xmark mr-2"></i>
        No, Leave
      </button>

    </div>

    <!-- FOOTER -->
    <p class="mt-8 text-xs text-white/40">
      © 2026 Lovebyte Games. All rights reserved.
    </p>

  </div>

  <script>
    // AUTO SKIP IF REMEMBERED
    if(localStorage.getItem("ageVerified") === "true"){
      window.location.href = "home.html";
    }

    // ENTER
    function enterSite(){

      const remember =
        document.getElementById("rememberChoice");

      if(remember.checked){
        localStorage.setItem("ageVerified", "true");
      }

      // CHANGE THIS TO YOUR MAIN PAGE
      window.location.href = "home.html";
    }

    // LEAVE
    function leaveSite(){
      window.location.href = "https://google.com";
    }
  </script>

</body>
</html>
